{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="glass-card animate-fade" style="max-width: 400px; width: 100%;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="background: rgba(139, 92, 246, 0.1); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem auto; color: #8b5cf6; font-size: 2rem;">
                <i class="fas fa-chalkboard-teacher"></i>
            </div>
            <h2 style="margin: 0; color: var(--primary);">Öğretmen Girişi</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem;">Yoklama paneline erişmek için giriş yapın.</p>
        </div>

        {% if form.errors %}
        <div style="background: rgba(239, 68, 68, 0.1); border-left: 4px solid #ef4444; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; color: #ef4444; font-size: 0.9rem;">
            Kullanıcı adı veya şifre hatalı. Lütfen tekrar deneyin.
        </div>
        {% endif %}

        <form method="POST" action="{% url 'teacher_login' %}">
            {% csrf_token %}
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% else %}
            <input type="hidden" name="next" value="{% url 'teacher_dashboard' %}">
            {% endif %}

            <div style="margin-bottom: 1.5rem;">
                <label for="id_username" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-main);">T.C. Kimlik / Kullanıcı Adı</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="text" name="username" id="id_username" required style="width: 100%; box-sizing: border-box; padding: 0.8rem 1rem 0.8rem 2.8rem; border: 2px solid #e2e8f0; border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.3s;">
                </div>
            </div>

            <div style="margin-bottom: 2rem;">
                <label for="id_password" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-main);">Şifre</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="password" name="password" id="id_password" required style="width: 100%; box-sizing: border-box; padding: 0.8rem 1rem 0.8rem 2.8rem; border: 2px solid #e2e8f0; border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.3s;">
                </div>
            </div>

            <button type="submit" class="btn" style="width: 100%; background: #8b5cf6;"><i class="fas fa-sign-in-alt"></i> Giriş Yap</button>
        </form>
    </div>
</div>

<style>
    input:focus {
        border-color: #8b5cf6 !important;
    }
</style>
{% endblock %}
